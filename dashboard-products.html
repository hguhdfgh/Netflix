<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات - NetZone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .header h1 {
            font-size: 28px;
            color: #60a5fa;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e50914 0%, #c70812 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(229, 9, 20, 0.3);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .product-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .product-card:hover {
            border-color: rgba(96, 165, 250, 0.5);
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.1);
        }

        .product-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .product-color {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid rgba(96, 165, 250, 0.3);
        }

        .product-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .product-info p {
            font-size: 12px;
            color: #94a3b8;
        }

        .product-details {
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.05);
        }

        .detail-label {
            color: #94a3b8;
        }

        .detail-value {
            color: #60a5fa;
            font-weight: 600;
        }

        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .btn-sm {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid #60a5fa;
        }

        .btn-edit:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid #f87171;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .btn-packages {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            border: 1px solid #86efac;
        }

        .btn-packages:hover {
            background: rgba(34, 197, 94, 0.3);
        }

        /* Packages Section */
        .packages-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .packages-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }

        .packages-header h2 {
            color: #60a5fa;
            font-size: 20px;
        }

        .packages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .package-item {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            padding: 15px;
        }

        .package-item h4 {
            margin-bottom: 10px;
            color: #e2e8f0;
        }

        .package-info {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .package-price {
            font-size: 18px;
            color: #86efac;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .package-actions {
            display: flex;
            gap: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(148, 163, 184, 0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #e2e8f0;
            font-family: inherit;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            background: #10b981;
            color: white;
            border-radius: 8px;
            display: none;
            z-index: 2000;
        }

        .toast.show {
            display: block;
        }

        .toast.error {
            background: #ef4444;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #60a5fa;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 إدارة المنتجات</h1>
            <button class="btn-primary" onclick="openAddProductModal()">+ منتج جديد</button>
        </div>

        <div id="productsContainer" class="products-grid">
            <div class="loading">جاري التحميل...</div>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">إضافة منتج جديد</h2>
                <button class="close-btn" onclick="closeProductModal()">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <div class="form-group">
                    <label>اسم المنتج *</label>
                    <input type="text" id="nameInput" placeholder="Netflix" required>
                </div>
                <div class="form-group">
                    <label>الرابط (slug) *</label>
                    <input type="text" id="slugInput" placeholder="netflix" required>
                </div>
                <div class="form-group">
                    <label>اللون</label>
                    <input type="color" id="colorInput" value="#e50914">
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="descriptionInput" placeholder="وصف المنتج..."></textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="activeInput" checked> نشط
                    </label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeProductModal()">إلغاء</button>
                    <button type="submit" class="btn-primary">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Package Modal -->
    <div class="modal" id="packageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>إضافة باقة</h2>
                <button class="close-btn" onclick="closePackageModal()">&times;</button>
            </div>
            <form id="packageForm" onsubmit="savePackage(event)">
                <div class="form-group">
                    <label>المدة (أيام) *</label>
                    <input type="number" id="durationInput" placeholder="30" min="1" required>
                </div>
                <div class="form-group">
                    <label>السعر (دج) *</label>
                    <input type="number" id="priceInput" placeholder="1000" min="0" required>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <input type="text" id="pkgDescInput" placeholder="شهر واحد">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closePackageModal()">إلغاء</button>
                    <button type="submit" class="btn-primary">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const SUPABASE_URL = 'https://anddcufhqiyxubzyynui.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuZGRjdWZocWl5eHVienl5bnVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDA4NzAsImV4cCI6MjA5NDg3Njg3MH0.YOeKXQGjNji-C4ZQcDbsKcSwmOatVjriqW09H-TBLPI';

        let productsData = [];
        let packagesData = [];
        let currentProductId = null;
        let currentPackageId = null;

        const supabase = {
            from: (table) => ({
                select: async (cols = '*', filters = '') => {
                    try {
                        const url = `${SUPABASE_URL}/rest/v1/${table}?select=${cols}${filters ? '&' + filters : ''}`;
                        const res = await fetch(url, {
                            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                        });
                        const data = await res.json();
                        return { data: res.ok ? data : [], error: res.ok ? null : data };
                    } catch(e) { return { data: [], error: e }; }
                },
                insert: async (rows) => {
                    try {
                        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
                            method: 'POST',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json',
                                'Prefer': 'return=representation'
                            },
                            body: JSON.stringify(rows)
                        });
                        let data = null;
                        const text = await res.text();
                        try { data = text ? JSON.parse(text) : null; } catch(e) { data = text; }
                        if (!res.ok) return { data: null, error: data };
                        return { data, error: null };
                    } catch(e) { return { data: null, error: e.message }; }
                },
                update: async (updates, filter) => {
                    try {
                        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(updates)
                        });
                        const data = await res.json();
                        return { data: res.ok ? data : null, error: res.ok ? null : data };
                    } catch(e) { return { data: null, error: e }; }
                },
                delete: async (filter) => {
                    try {
                        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
                            method: 'DELETE',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                            }
                        });
                        return { error: res.ok ? null : await res.json() };
                    } catch(e) { return { error: e }; }
                }
            })
        };

        async function loadProducts() {
            const { data } = await supabase.from('products').select('*', 'order=order_index.asc');
            productsData = data || [];
            displayProducts();
        }

        function displayProducts() {
            const container = document.getElementById('productsContainer');
            
            if (productsData.length === 0) {
                container.innerHTML = '<div class="empty-state">لا توجد منتجات</div>';
                return;
            }

            container.innerHTML = productsData.map(p => `
                <div class="product-card">
                    <div class="product-header">
                        <div class="product-color" style="background: ${p.color}"></div>
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <p>${p.slug}</p>
                        </div>
                    </div>
                    <div class="product-details">
                        <div class="detail-item">
                            <span class="detail-label">الحالة</span>
                            <span class="detail-value">${p.is_active ? '✅ نشط' : '❌ معطّل'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">الوصف</span>
                            <span class="detail-value">${p.description || '-'}</span>
                        </div>
                    </div>
                    <div class="product-actions">
                        <button class="btn-sm btn-packages" onclick="loadPackages('${p.id}', '${p.name}')">📦 الباقات</button>
                        <button class="btn-sm btn-edit" onclick="editProduct('${p.id}')">✏️ تعديل</button>
                        <button class="btn-sm btn-delete" onclick="deleteProduct('${p.id}')">🗑️ حذف</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadPackages(productId, productName) {
            currentProductId = productId;
            const { data } = await supabase.from('product_packages').select('*', `product_id=eq.${productId}&order=duration.asc`);
            packagesData = data || [];
            displayPackagesModal(productName);
        }

        function displayPackagesModal(productName) {
            const section = document.querySelector('.packages-section') || createPackagesSection();
            
            let html = `
                <div class="packages-header">
                    <h2>📦 باقات ${productName}</h2>
                    <button class="btn-primary" style="padding: 8px 16px; font-size: 12px;" onclick="openPackageModal()">+ إضافة باقة</button>
                </div>
                <div class="packages-grid">
            `;
            
            if (packagesData.length === 0) {
                html += '<div class="empty-state">لا توجد باقات</div>';
            } else {
                html += packagesData.map(pkg => `
                    <div class="package-item">
                        <h4>${pkg.description || pkg.duration + ' يوم'}</h4>
                        <div class="package-info">
                            المدة: ${pkg.duration} يوم
                        </div>
                        <div class="package-price">${pkg.price} دج</div>
                        <div class="package-actions">
                            <button class="btn-sm btn-edit" style="flex: 1;" onclick="editPackage('${pkg.id}')">تعديل</button>
                            <button class="btn-sm btn-delete" style="flex: 1;" onclick="deletePackage('${pkg.id}')">حذف</button>
                        </div>
                    </div>
                `).join('');
            }
            
            html += '</div>';
            section.innerHTML = html;
            section.style.display = 'block';
            section.scrollIntoView({ behavior: 'smooth' });
        }

        function createPackagesSection() {
            const section = document.createElement('div');
            section.className = 'packages-section';
            document.querySelector('.container').appendChild(section);
            return section;
        }

        async function saveProduct(e) {
            e.preventDefault();
            
            const productData = {
                name: document.getElementById('nameInput').value,
                slug: document.getElementById('slugInput').value,
                color: document.getElementById('colorInput').value,
                description: document.getElementById('descriptionInput').value,
                is_active: document.getElementById('activeInput').checked
            };
            
            let result;
            if (currentProductId) {
                result = await supabase.from('products').update(productData, `id=eq.${currentProductId}`);
            } else {
                result = await supabase.from('products').insert([productData]);
            }
            
            if (result.error) {
                showToast('خطأ في الحفظ', 'error');
                return;
            }
            
            showToast(currentProductId ? 'تم التحديث بنجاح' : 'تم الإضافة بنجاح');
            closeProductModal();
            loadProducts();
        }

        async function savePackage(e) {
            e.preventDefault();
            
            const packageData = {
                product_id: currentProductId,
                duration: parseInt(document.getElementById('durationInput').value),
                price: parseInt(document.getElementById('priceInput').value),
                description: document.getElementById('pkgDescInput').value
            };
            
            let result;
            if (currentPackageId) {
                result = await supabase.from('product_packages').update(packageData, `id=eq.${currentPackageId}`);
            } else {
                result = await supabase.from('product_packages').insert([packageData]);
            }
            
            if (result.error) {
                showToast('خطأ في الحفظ', 'error');
                return;
            }
            
            showToast('تم الحفظ بنجاح');
            closePackageModal();
            loadPackages(currentProductId, 'المنتج');
        }

        function openAddProductModal() {
            currentProductId = null;
            document.getElementById('modalTitle').textContent = 'إضافة منتج جديد';
            document.getElementById('productForm').reset();
            document.getElementById('productModal').classList.add('active');
        }

        function editProduct(id) {
            const product = productsData.find(p => p.id === id);
            if (!product) return;
            
            currentProductId = id;
            document.getElementById('modalTitle').textContent = 'تعديل المنتج';
            document.getElementById('nameInput').value = product.name;
            document.getElementById('slugInput').value = product.slug;
            document.getElementById('colorInput').value = product.color || '#e50914';
            document.getElementById('descriptionInput').value = product.description || '';
            document.getElementById('activeInput').checked = product.is_active;
            
            document.getElementById('productModal').classList.add('active');
        }

        function openPackageModal() {
            currentPackageId = null;
            document.getElementById('packageForm').reset();
            document.getElementById('packageModal').classList.add('active');
        }

        function editPackage(id) {
            const pkg = packagesData.find(p => p.id === id);
            if (!pkg) return;
            
            currentPackageId = id;
            document.getElementById('durationInput').value = pkg.duration;
            document.getElementById('priceInput').value = pkg.price;
            document.getElementById('pkgDescInput').value = pkg.description || '';
            
            document.getElementById('packageModal').classList.add('active');
        }

        async function deleteProduct(id) {
            if (!confirm('هل تريد حذف هذا المنتج؟')) return;
            
            const { error } = await supabase.from('products').delete(`id=eq.${id}`);
            
            if (error) {
                showToast('خطأ في الحذف', 'error');
                return;
            }
            
            showToast('تم الحذف بنجاح');
            loadProducts();
        }

        async function deletePackage(id) {
            if (!confirm('هل تريد حذف هذه الباقة؟')) return;
            
            const { error } = await supabase.from('product_packages').delete(`id=eq.${id}`);
            
            if (error) {
                showToast('خطأ في الحذف', 'error');
                return;
            }
            
            showToast('تم الحذف بنجاح');
            loadPackages(currentProductId, 'المنتج');
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
            currentProductId = null;
        }

        function closePackageModal() {
            document.getElementById('packageModal').classList.remove('active');
            currentPackageId = null;
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast show ${type === 'error' ? 'error' : ''}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        loadProducts();
    </script>
</body>
</html>
